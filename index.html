<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrowserCraft Multiplayer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="start-menu" class="start-menu">
    <div class="menu-card">
      <h1>BrowserCraft Online</h1>
      <p class="menu-sub">Host создаёт комнату, Connect подключается по коду комнаты.</p>
      <label class="menu-label" for="nickname-input">Никнейм</label>
      <input id="nickname-input" class="menu-input" type="text" placeholder="Например: Steve" maxlength="16" />
      <label class="menu-label" for="connect-address">Код комнаты (для Connect)</label>
      <input id="connect-address" class="menu-input" type="text" placeholder="Например: A1B2C3" />
      <div class="menu-actions">
        <button id="btn-host" class="menu-btn">Host</button>
        <button id="btn-connect" class="menu-btn menu-btn-primary">Connect</button>
      </div>
      <div id="menu-status" class="menu-status"></div>

      <div id="host-message" class="host-message hidden">
        <div id="host-message-text" class="host-message-text"></div>
        <div class="host-message-actions">
          <button id="btn-copy-host" class="menu-btn">Скопировать</button>
          <button id="btn-close-host" class="menu-btn menu-btn-primary">Закрыть и играть</button>
        </div>
      </div>
    </div>
  </div>

  <div class="hud">
    <div class="title">BrowserCraft Multiplayer</div>
    <div id="debug" class="debug"></div>
    <div class="help">
      <div><b>Управление:</b> WASD — движение, Пробел — прыжок, Shift — спринт</div>
      <div>Мышь — обзор (кликни по экрану для захвата), ЛКМ — сломать блок, ПКМ — поставить</div>
      <div>1..8 — выбрать блок в хотбаре</div>
    </div>
  </div>

  <div id="crosshair" class="crosshair">+</div>
  <div id="hotbar" class="hotbar"></div>

  <div id="chat" class="chat">
    <div id="chat-log" class="chat-log"></div>
    <div class="chat-input-row">
      <input id="chat-input" class="chat-input" type="text" maxlength="240" placeholder="Напиши сообщение..." />
      <button id="chat-send" class="chat-send">Send</button>
    </div>
  </div>

  <script type="module" src="client.js"></script>
</body>
</html>
